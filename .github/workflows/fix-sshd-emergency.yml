name: Emergency sshd fix (DAK-7089, delete after use)
on:
  workflow_dispatch: {}
jobs:
  fix-firewall:
    name: Check Hetzner Cloud Firewall for port 22
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Diagnose connection state
        run: |
          echo "=== SSH service status ==="
          systemctl status ssh.service --no-pager | head -10 || true
          echo "=== Port 22 listening ==="
          ss -tlnp | grep ':22' || echo "NOT listening"
          echo "=== UFW status ==="
          ufw status verbose 2>/dev/null | head -20 || echo "UFW unavailable"
          echo "=== iptables rule 1 ==="
          iptables -L INPUT -n --line-numbers 2>/dev/null | head -5 || true
          echo "=== Self-connect test ==="
          nc -zv 127.0.0.1 22 2>&1 || echo "localhost:22 refused"
          echo "=== Server public IP ==="
          curl -sf --max-time 5 https://api.ipify.org || echo "IP unavailable"
