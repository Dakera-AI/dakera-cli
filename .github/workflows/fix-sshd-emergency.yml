name: Emergency sshd fix (DAK-7089, delete after use)
on:
  workflow_dispatch: {}
jobs:
  fix-sshd:
    name: Restart sshd on ARM machine
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Check and restart ssh
        run: |
          echo "=== ssh service status ==="
          systemctl status ssh --no-pager || true
          systemctl status openssh-server --no-pager 2>/dev/null || true
          echo "=== Restarting ssh service ==="
          systemctl restart ssh || systemctl restart openssh-server || true
          echo "=== Enabling ssh service for future boots ==="
          systemctl enable ssh 2>/dev/null || systemctl enable openssh-server 2>/dev/null || true
          sleep 2
          echo "=== ssh after restart ==="
          systemctl status ssh --no-pager | head -10 || true
          echo "=== Port 22 ==="
          ss -tlnp | grep ':22' || echo "Port 22 NOT listening after restart attempt"
