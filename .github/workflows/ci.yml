name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'CHANGELOG*'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'CHANGELOG*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Security Audit
    runs-on: [self-hosted, linux, arm64]
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  check:
    name: Check
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check
      - run: cargo check

  clippy:
    name: Clippy
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
      - run: cargo clippy -- -D warnings

  fmt:
    name: Format
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  test:
    name: Test
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
      - run: cargo test
