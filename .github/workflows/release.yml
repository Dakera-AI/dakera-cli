# Code generated by `cargo dist` - DO NOT EDIT manually
# Edit dist-workspace.toml and re-run `cargo dist generate` to regenerate

name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '*-?[0-9]+.[0-9]+.[0-9]+*'

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.26.0/cargo-dist-installer.sh | sh"
      - name: Cache cargo-dist
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/dist
          key: ${{ runner.os }}-cargo-dist-v0.26.0
      - name: Run cargo-dist plan
        id: plan
        shell: bash
        run: |
          cargo dist plan --tag=${{ github.ref_name }} --output-format=json > plan.json
          echo "manifest=$(cat plan.json)" >> "$GITHUB_OUTPUT"
          cat plan.json
      - name: Upload dist-manifest.json
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-plan-dist-manifest
          path: dist-manifest.json

  build-local-artifacts:
    needs: plan
    runs-on: "${{ matrix.runner }}"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos
            runner: macos-latest
          - target: x86_64-apple-darwin
            os: macos
            runner: macos-13
          - target: x86_64-unknown-linux-gnu
            os: linux
            runner: ubuntu-22.04
          - target: x86_64-pc-windows-msvc
            os: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install cargo-dist
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.26.0/cargo-dist-installer.sh | sh"
      - name: Build artifacts
        shell: bash
        run: cargo dist build --print=linkage --output-format=json --target=${{ matrix.target }} > build-dist-${{ matrix.target }}.json
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.target }}
          path: dist/

  build-global-artifacts:
    needs: plan
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.26.0/cargo-dist-installer.sh | sh"
      - name: Build global artifacts (shell/powershell installer scripts, homebrew formula)
        run: cargo dist build --output-format=json --global-artifacts > build-global.json
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-global
          path: dist/

  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.26.0/cargo-dist-installer.sh | sh"
      - name: Fetch all built artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: dist/
          merge-multiple: true
      - name: Publish to GitHub Releases + push Homebrew formula
        shell: bash
        run: cargo dist host --steps=upload --steps=release --output-format=json
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # Publish to crates.io on each release
  publish-crate:
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: |
          output=$(cargo publish --allow-dirty 2>&1) && echo "$output" || {
            echo "$output"
            echo "$output" | grep -q "already exists" && echo "crate already published, skipping" || exit 1
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
