[workspace]
members = ["cargo:."]

[dist]
cargo-dist-version = "0.26.0"
ci = "github"
# npm installer excluded until DAK-5408 (npm org setup) is complete
installers = ["shell", "powershell", "homebrew"]
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
pr-run-mode = "plan"
# DAK-7448: cargo-dist 0.26.0 wants to regenerate release.yml (comment format changed),
# but the existing workflow is functionally correct. Skip the staleness check.
allow-dirty = ["ci"]
# GitHub retired ubuntu-20.04, windows-2019, macos-13 — override to maintained runners
github-custom-runners = { x86_64-unknown-linux-gnu = "ubuntu-22.04", aarch64-apple-darwin = "macos-14", x86_64-apple-darwin = "macos-14", x86_64-pc-windows-msvc = "windows-2022" }
publish-jobs = ["homebrew"]
install-path = "CARGO_HOME"
tap = "dakera-ai/homebrew-tap"
formula = "dk"
# Emit .tar.gz on unix targets (binstall, deploy.yml, and homebrew all expect dk-{target}.tar.gz)
unix-archive = ".tar.gz"
