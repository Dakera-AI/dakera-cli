[workspace]
members = ["cargo:."]

[dist]
cargo-dist-version = "0.26.0"
ci = "github"
# npm installer excluded until DAK-5408 (npm org setup) is complete
installers = ["shell", "powershell", "homebrew"]
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
pr-run-mode = "plan"
publish-jobs = ["homebrew"]
install-path = "CARGO_HOME"
tap = "dakera-ai/homebrew-tap"
formula = "dk"
